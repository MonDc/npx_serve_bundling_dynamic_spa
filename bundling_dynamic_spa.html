<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Color Circles SPA</title><style>body{font-family:"Segoe UI",Arial,sans-serif;background:#f5f5f5;display:flex;flex-direction:column;align-items:center;padding:40px;height:100vh;overflow:hidden}h1{margin-bottom:30px}#container{position:relative;width:500px;height:500px;border:1px solid #ccc;border-radius:10px;background:white}.color-box{width:100px;height:100px;border-radius:10px;position:absolute;border:1px solid #ddd;display:flex;align-items:center;justify-content:center;color:white;font-weight:bold;font-size:16px}.yellow{background:yellow;color:black}.green{background:green}.gold{background:gold;color:black}.orange{background:orange}</style></head><body><h1>Color Circles SPA</h1><div id="container"></div><script>const colors=[{name:"Yellow",class:"yellow"},{name:"Green",class:"green"},{name:"Gold",class:"gold"},{name:"Orange",class:"orange"}],container=document.getElementById("container"),centerX=200,centerY=200,radius=150,speed=.02,boxes=colors.map((e,t)=>{const n=document.createElement("div");return n.className="color-box "+e.class,n.innerText=e.name,container.appendChild(n),{div:n,angle:t*Math.PI/2}});function animate(){boxes.forEach(e=>{e.angle+=speed;const t=centerX+radius*Math.cos(e.angle),n=centerY+radius*Math.sin(e.angle);e.div.style.left=t+"px",e.div.style.top=n+"px"}),requestAnimationFrame(animate)}animate();</script></body></html>
